# controllers.yaml
# tracer_jaka_zu5 移动机械臂的 ros2_control 控制器配置
controller_manager:
  ros__parameters:
    update_rate: 200          # 必须 <= MuJoCo 1/timestep = 500Hz，留余量取 200
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    base_controller:
      type: diff_drive_controller/DiffDriveController

# ===================== 机械臂 =====================
arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0

